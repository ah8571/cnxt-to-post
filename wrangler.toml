name = "cnxt-to-post"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Routes — API lives on post.cnxt.to
routes = [
  { pattern = "post.cnxt.to/*", zone_name = "cnxt.to" }
]

# KV for rate limiting counters (set after creation: npx wrangler kv:namespace create RATE_LIMITS)
# [[kv_namespaces]]
# binding = "RATE_LIMITS"
# id = ""

[vars]
ENVIRONMENT = "production"
