name = "cnxt-to-post"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Routes — API lives on post.cnxt.to
routes = [
  { pattern = "post.cnxt.to/*", zone_name = "cnxt.to" }
]

# KV for rate limiting counters
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "0a83c67d64d5484e96cb732f64e19c89"

[vars]
ENVIRONMENT = "production"
